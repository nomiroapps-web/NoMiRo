# Deploy to GitHub Pages on every push to main.
# Build-time VITE_* vars are stored as GitHub Actions secrets.
#
# Setup:
#   1. Settings → Pages → Source: GitHub Actions
#   2. Settings → Secrets → Actions → add the variables below

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_BACKEND_MODE: ${{ secrets.VITE_BACKEND_MODE || 'local' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_OIDC_AUTHORITY: ${{ secrets.VITE_OIDC_AUTHORITY }}
          VITE_OIDC_CLIENT_ID: ${{ secrets.VITE_OIDC_CLIENT_ID }}
          VITE_OIDC_REDIRECT_URI: ${{ secrets.VITE_OIDC_REDIRECT_URI }}
          VITE_OIDC_POST_LOGOUT_URI: ${{ secrets.VITE_OIDC_POST_LOGOUT_URI }}
          VITE_OIDC_SCOPE: ${{ secrets.VITE_OIDC_SCOPE || 'openid profile email' }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
        run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
