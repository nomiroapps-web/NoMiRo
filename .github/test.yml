# Run tests and lint on every PR and push to main.

name: Test & Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint || true   # non-blocking until lint errors are fixed

      - name: Test
        run: npm test
