# Build a signed Android AAB for Play Store release.
# Triggered manually (workflow_dispatch) or on a version tag (v*).
#
# Setup:
#   1. Generate a keystore: keytool -genkey -v -keystore nomiro.keystore -alias nomiro -keyalg RSA -keysize 2048 -validity 10000
#   2. Encode: base64 -w 0 nomiro.keystore > nomiro.keystore.b64
#   3. Add these GitHub Secrets:
#        ANDROID_KEYSTORE_BASE64  – content of nomiro.keystore.b64
#        ANDROID_KEY_ALIAS        – e.g. nomiro
#        ANDROID_KEY_STORE_PASSWORD
#        ANDROID_KEY_PASSWORD
#        and all VITE_* build vars

name: Android Release Build

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: npm ci

      - name: Build web bundle
        env:
          VITE_BACKEND_MODE: ${{ secrets.VITE_BACKEND_MODE || 'local' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_OIDC_AUTHORITY: ${{ secrets.VITE_OIDC_AUTHORITY }}
          VITE_OIDC_CLIENT_ID: ${{ secrets.VITE_OIDC_CLIENT_ID }}
          VITE_OIDC_REDIRECT_URI: ${{ secrets.VITE_OIDC_REDIRECT_URI }}
          VITE_OIDC_POST_LOGOUT_URI: ${{ secrets.VITE_OIDC_POST_LOGOUT_URI }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/nomiro.keystore

      - name: Build release AAB
        working-directory: android
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_STORE_PASSWORD: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/nomiro.keystore \
            -Pandroid.injected.signing.store.password="$ANDROID_KEY_STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: nomiro-release-${{ github.ref_name }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
